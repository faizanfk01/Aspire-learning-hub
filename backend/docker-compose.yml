version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aspire_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aspire_password}
      POSTGRES_DB: ${POSTGRES_DB:-aspire_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind to loopback only — the DB is reachable from the host for local tools
    # (psql, pgAdmin) but NOT exposed to any other machine on the network.
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aspire_user} -d ${POSTGRES_DB:-aspire_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
